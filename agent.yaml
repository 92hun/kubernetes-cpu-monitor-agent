apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cpu-monitoring
  namespace: whatap
  labels:
    app: cpu-monitoring
spec:
  selector:
    matchLabels:
      app: cpu-monitoring
  template:
    metadata:
      labels:
        app: cpu-monitoring
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: cpu-monitor
          image: cpu-monitor:1.0.0
          imagePullPolicy: Never
          env:
            - name: PROC_ROOT
              value: /host/proc
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
